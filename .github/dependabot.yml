# Dependabot configuration for the STARTcloud Provisioner Catalog
# Keeps the GitHub Actions used by the workflows up to date. The catalog has
# no runtime dependencies beyond the workflows themselves.

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'github-actions'
      - 'dependencies'
    commit-message:
      prefix: 'ci'

  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'ci'
