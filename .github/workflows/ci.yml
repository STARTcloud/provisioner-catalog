name: CI

# Reusable CI — the hacs/default lint.yml role: validate the hand-edited lists
# against their JSON Schemas, enforce sortedness, lint the workflows, then
# chain CodeQL. Called by release-please.yml on push to main, and run directly
# on every PR (the admission gate itself lives in checks.yml).

on:
  workflow_call:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  jsonschema:
    name: JSON schema
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies if needed
        run: bash scripts/setup

      - name: Validate sources.yml and removed.yml
        run: python3 -m scripts.validate_schemas

  sorted:
    name: Sorted
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies if needed
        run: bash scripts/setup

      - name: Check lists
        run: python3 -m scripts.is_sorted

  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  web:
    name: Web Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Check locale key parity against en
        run: |
          node --input-type=module <<'EOF'
          import fs from 'fs';
          const flat = (obj, prefix = '') =>
            Object.entries(obj).flatMap(([key, value]) =>
              value && typeof value === 'object' ? flat(value, `${prefix}${key}.`) : [`${prefix}${key}`]
            );
          const read = lang => new Set(flat(JSON.parse(fs.readFileSync(`public/locales/${lang}/common.json`, 'utf8'))));
          const en = read('en');
          const langs = fs.readdirSync('public/locales').filter(dir => dir !== 'en');
          let failed = false;
          for (const lang of langs) {
            const keys = read(lang);
            const missing = [...en].filter(key => !keys.has(key));
            const extra = [...keys].filter(key => !en.has(key));
            if (missing.length > 0) {
              failed = true;
              console.error(`${lang}/common.json is MISSING ${missing.length} keys:\n  ${missing.join('\n  ')}`);
            }
            if (extra.length > 0) {
              failed = true;
              console.error(`${lang}/common.json has ${extra.length} keys en lacks:\n  ${extra.join('\n  ')}`);
            }
            if (missing.length === 0 && extra.length === 0) {
              console.log(`${lang}: parity OK (${keys.size} keys)`);
            }
          }
          process.exit(failed ? 1 : 0);
          EOF

      - name: Build
        run: npm run build

  codeql-analysis:
    name: CodeQL
    needs: [jsonschema, sorted, actionlint, web]
    uses: ./.github/workflows/codeql.yml
